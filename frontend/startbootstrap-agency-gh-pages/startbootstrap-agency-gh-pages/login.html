<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | KickStore</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div class="background-overlay"></div>

<div class="login-container">

    <!-- Left Side -->
    <div class="left-side">

        <div class="logo">
            <i class="fa-solid fa-futbol"></i>
            <h1>S&L Store</h1>
        </div>

        <h2>Gear Up.<br>Play Hard.<br>Win Every Match.</h2>

        <p>
            Shop premium football boots, jerseys,
            balls and accessories from the world's
            top brands.
        </p>

    </div>

    <!-- Right Side -->
    <div class="login-card">

        <h2>Welcome Back</h2>

        <p class="subtitle">
            Login to continue shopping.
        </p>

        <form action="#" method="POST">

            <div class="input-box">
                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>
            </div>

            <div class="input-box password-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <span id="togglePassword">
                    <i class="fa-solid fa-eye"></i>
                </span>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">
                    Forgot Password?
                </a>

            </div>

            <button class="login-btn" id="btnLogin">
                Login
            </button>

            <div class="divider">
                <span>OR</span>
            </div>

            <!-- <button type="button" class="google-btn">

                <i class="fa-brands fa-google"></i>

                Continue with Google

            </button> -->

            <p class="signup">

                Don't have an account?

                <a href="register.html">

                    Create Account

                </a>

            </p>

        </form>

    </div>

</div>

<script>

const toggle=document.getElementById("togglePassword");

const password=document.getElementById("password");

toggle.onclick=function(){

if(password.type==="password"){

password.type="text";

toggle.innerHTML='<i class="fa-solid fa-eye-slash"></i>';

}else{

password.type="password";

toggle.innerHTML='<i class="fa-solid fa-eye"></i>';

}
}


let sendFun = async(event)=>{
     
    let email = document.getElementById('email').value;
    let pass = document.getElementById("password").value;
    event.preventDefault(); // ✅ stop form reload

    let payload = {
        email: email,

        password: pass,
    };

    try {
        let response = await fetch('http://localhost:8000/api/login', {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        let data = await response.json(); // ✅ read response
        console.log("Server response:", data);

        alert("Created User: " + JSON.stringify(data));
        return data;
    } catch (err) {
        console.error("Error submitting:", err);
        alert("Failed to create user");
    }
}


document.getElementById('btnLogin').addEventListener('click',async (e)=>{
    e.preventDefault();
    // e.preventDefault();
    let result = await sendFun(e);   // wait for async to finish
    if (result["isSuccessful"]) {
        window.location.href = "./index.html";
    } else {
        alert("Error Wrong Credentials");
    }
})

</script>

</body>
</html>
