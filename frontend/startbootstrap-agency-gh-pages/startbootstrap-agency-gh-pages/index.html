<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S&L Football Store</title>

  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    body { font-family: 'Poppins', sans-serif; margin:0; background:#f8f9fa; }
    header { background:#111; color:#fff; padding:15px 40px; display:flex; justify-content:space-between; align-items:center; }
    .logo { display:flex; align-items:center; }
    .logo i { margin-right:10px; color:#00bfff; }
    nav ul { list-style:none; display:flex; margin:0; padding:0; }
    nav ul li { margin-left:20px; }
    nav ul li a { color:#fff; text-decoration:none; font-weight:500; }
    nav ul li a:hover { color:#00bfff; }
    .nav-icons { display:flex; align-items:center; }
    .nav-icons i { margin-left:20px; cursor:pointer; }
    .hero { background:#222 url('images/hero-banner.jpg') center/cover no-repeat; height:70vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; color:#fff; }
    .hero h1 { font-size:48px; font-weight:700; margin-bottom:10px; }
    .hero p { font-size:18px; margin-bottom:20px; }
    .hero a { background:#00bfff; color:#fff; padding:12px 30px; border-radius:5px; text-decoration:none; font-weight:600; }
    .hero a:hover { background:#0099cc; }
    section { padding:60px 40px; text-align:center; }
    .categories .grid { display:flex; justify-content:center; gap:40px; flex-wrap:wrap; }
    .categories .item { background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); width:180px; }
    .categories .item i { font-size:32px; color:#00bfff; margin-bottom:10px; }
    footer { background:#111; color:#fff; text-align:center; padding:15px; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <i class="fa-solid fa-futbol"></i>
    <h2>S&L</h2>
  </div>
  <nav>
    <ul>
        <li><a href="index.html">Home</a></li>
      <li><a href="products.html">Products</a></li>
      <li><a href="addToCart.html">Cart</a></li>
      <li><a href="login.html">Login</a></li>
    </ul>
  </nav>
  <!-- <div class="nav-icons">
    <i class="fa-solid fa-heart"></i>
    <a href="addToCart.html"><i class="fa-solid fa-cart-shopping"></i></a>
  </div> -->
</header>

<section class="hero">
  <h1>Dominate the Game</h1>
  <p>Premium football boots, jerseys and accessories for professionals.</p>
  <a href="#products">Shop Now</a>
</section>

<section id="categories" class="categories">
  <h2>Shop Categories</h2>
  <div class="grid">
    <div class="item"><i class="fa-solid fa-shoe-prints"></i><h3>Football Boots</h3></div>
    <div class="item"><i class="fa-solid fa-shirt"></i><h3>Jerseys</h3></div>
    <div class="item"><i class="fa-solid fa-futbol"></i><h3>Footballs</h3></div>
    <div class="item"><i class="fa-solid fa-person-running"></i><h3>Training Gear</h3></div>
  </div>
</section>

<section id="products">
  <h2>Featured Products</h2>
  <!-- You can later inject product cards here with JS -->
</section>

<section id="contact">
  <h2>Contact Us</h2>
  <form>
    <input type="text" placeholder="Your Name"><br><br>
    <input type="email" placeholder="Email"><br><br>
    <textarea placeholder="Message"></textarea><br><br>
    <button type="submit">Send Message</button>
  </form>
</section>

<footer>
  <p>&copy; 2026 S&L Football Store. All rights reserved.</p>
</footer>

<script>
  // Example JS: toggle mobile menu
  function menuToggle() {
    const nav = document.querySelector('nav ul');
    nav.classList.toggle('open');
  }


  async function loadProduct() {
  const response = await fetch("http://localhost:8000/api/index");
  const product = await response.json();

  document.getElementById("products").innerHTML = `
    <div class="product-card">
      <img src="${product.image_url}" alt="${product.name}" style="width:200px; border-radius:8px;">
      <h3>${product.name}</h3>
      <p>$${product.price}</p>
    </div>
  `;
}

loadProduct();
</script>

</body>
</html>
