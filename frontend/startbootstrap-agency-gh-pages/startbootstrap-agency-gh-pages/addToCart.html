<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart - S&L Football Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family:'Poppins',sans-serif; margin:0; background:#f8f9fa; }
    header { background:#111; color:#fff; padding:15px 40px; display:flex; justify-content:space-between; align-items:center; }
    nav ul { list-style:none; display:flex; margin:0; padding:0; }
    nav ul li { margin-left:20px; }
    nav ul li a { color:#fff; text-decoration:none; font-weight:500; }
    nav ul li a:hover { color:#00bfff; }
    section { padding:40px; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { padding:15px; text-align:center; border-bottom:1px solid #ddd; }
    th { background:#111; color:#fff; }
    .remove-btn { background:#dc3545; color:#fff; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; }
    .remove-btn:hover { background:#b02a37; }
    .checkout { text-align:right; margin-top:20px; }
    .checkout-btn { background:#000; color:#fff; padding:12px 25px; border:none; border-radius:5px; cursor:pointer; font-weight:600; }
    .checkout-btn:hover { background:#333; }
  </style>
</head>
<body>
<header>
  <div class="logo"><i class="fa-solid fa-futbol"></i><h2>S&L</h2></div>
  <nav><ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
  </ul></nav>
</header>

<section>
  <h1>Shopping Cart</h1>
  <table id="cartTable">
    <thead>
      <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Subtotal</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="cartItems"></tbody>
  </table>
  <div class="checkout">
    <h3 id="total">Total: $0</h3>
    <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
  </div>
</section>

<script>
async function loadCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const res = await fetch("http://localhost:8000/api/cart", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ ids: cart })
  });

  const products = await res.json();
  const cartItems = document.getElementById("cartItems");
  cartItems.innerHTML = "";

  let total = 0;

  products.forEach(product => {
    const quantity = 1; // default quantity for now
    const subtotal = product.price * quantity;
    total += subtotal;

    cartItems.innerHTML += `
      <tr>
        <td>${product.name}</td>
        <td>$${product.price}</td>
        <td>${quantity}</td>
        <td>$${subtotal}</td>
        <td><button class="remove-btn" onclick="removeItem(${product.id})">Remove</button></td>
      </tr>
    `;
  });

  document.getElementById("total").innerText = "Total: $" + total;
}

function removeItem(id) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart = cart.filter(itemId => itemId !== id);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart(); // reload cart after removal
}

// document.getElementById('checkout-btn').addEventListener('click', () => {
  // localStorage.removeItem("cart"); // Clear the cart after checkout
//   alert('Proceeding to checkout...');
  // window.location.href = "./index.html"; // Redirect to a checkout page (you can create this page)
//   // Here you can redirect to a checkout page or handle the checkout process

// });

loadCart();


document.getElementById("checkoutBtn").addEventListener("click", () => {
  // Example: clear cart and redirect
  localStorage.removeItem("cart"); // clear cart after checkout
  alert("Proceeding to checkout...");

  // Redirect to a checkout page (create checkout.html if you want a form)
  window.location.href = "./index.html";
});

</script>
</body>
</html>
