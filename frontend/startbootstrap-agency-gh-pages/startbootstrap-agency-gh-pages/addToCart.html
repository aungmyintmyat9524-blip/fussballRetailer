<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family:'Poppins',sans-serif; margin:0; background:#f8f9fa; }
    header { background:#111; color:#fff; padding:15px 40px; display:flex; justify-content:space-between; align-items:center; }
    nav ul { list-style:none; display:flex; margin:0; padding:0; }
    nav ul li { margin-left:20px; }
    nav ul li a { color:#fff; text-decoration:none; font-weight:500; }
    nav ul li a:hover { color:#00bfff; }
    section { padding:60px 40px; text-align:center; }
    .cart-item { background:#fff; padding:20px; margin:10px auto; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); width:300px; }
    .cart-item img { width:100%; border-radius:8px; }
    footer { background:#111; color:#fff; text-align:center; padding:15px; }
  </style>
</head>
<body>
<header>
  <div class="logo"><i class="fa-solid fa-futbol"></i><h2>S&L</h2></div>
  <nav><ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
  </ul></nav>
</header>

  <h1>Your Cart</h1>
  <div id="cartItems"></div>

  <script>
    async function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const container = document.getElementById("cartItems");
      container.innerHTML = "";

      for (let id of cart) {
        const res = await fetch(`http://localhost:8000/api/products/${id}`);
        const product = await res.json();
        container.innerHTML += `
          <div class="cart-item">
            <img src="${product.image_url}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p>$${product.price}</p>
          </div>
        `;
      }
    }
    loadCart();
  </script>
</body>
</html>
