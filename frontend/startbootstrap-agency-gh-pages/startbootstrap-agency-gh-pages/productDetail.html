<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family:'Poppins',sans-serif; margin:0; background:#f8f9fa; }
    header { background:#111; color:#fff; padding:15px 40px; display:flex; justify-content:space-between; align-items:center; }
    .logo i { margin-right:10px; color:#00bfff; }
    nav ul { list-style:none; display:flex; margin:0; padding:0; }
    nav ul li { margin-left:20px; }
    nav ul li a { color:#fff; text-decoration:none; font-weight:500; }
    nav ul li a:hover { color:#00bfff; }
    section { padding:60px 40px; text-align:center; }
    .product-detail img { width:300px; border-radius:8px; }
    footer { background:#111; color:#fff; text-align:center; padding:15px; }
  </style>
</head>
<body>
<header>
  <div class="logo"><i class="fa-solid fa-futbol"></i><h2>S&L</h2></div>
  <nav><ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="cart.html">Cart</a></li>
  </ul></nav>
</header>

<section id="productDetail" class="product-detail"></section>

<footer><p>&copy; 2026 S&L Football Store. All rights reserved.</p></footer>

<script>
async function loadProduct() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const res = await fetch(`http://localhost:8000/api/products/${id}`);
  const product = await res.json();
  document.getElementById("productDetail").innerHTML = `
    <img src="${product.image_url}" alt="${product.name}">
    <h2>${product.name}</h2>
    <p>Price: $${product.price}</p>
    <button onclick="addToCart(${product.id})">Add to Cart</button>`;
}
function addToCart(id) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(id);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart!");
}
loadProduct();
</script>
</body>
</html>
