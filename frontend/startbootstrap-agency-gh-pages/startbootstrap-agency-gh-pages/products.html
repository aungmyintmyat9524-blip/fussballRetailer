<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - S&L Football Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    body { font-family:'Poppins',sans-serif; margin:0; background:#f8f9fa; }
    header { background:#111; color:#fff; padding:15px 40px; display:flex; justify-content:space-between; align-items:center; }
    .logo { display:flex; align-items:center; }
    .logo i { margin-right:10px; color:#00bfff; }
    nav ul { list-style:none; display:flex; margin:0; padding:0; }
    nav ul li { margin-left:20px; }
    nav ul li a { color:#fff; text-decoration:none; font-weight:500; }
    nav ul li a:hover { color:#00bfff; }
    .nav-icons { display:flex; align-items:center; }
    .nav-icons i { margin-left:20px; cursor:pointer; }

    section { padding:40px; }
    h1 { text-align:center; margin-bottom:30px; }

    /* Filter bar */
    .filters { display:flex; justify-content:center; gap:20px; margin-bottom:30px; }
    .filters select { padding:10px; border-radius:5px; border:1px solid #ccc; font-family:'Poppins'; }

    /* Product grid */
    .product-grid { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
    .product-card { background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); width:220px; text-align:center; }
    .product-card img { width:100%; border-radius:8px; margin-bottom:10px; }
    .product-card h3 { font-size:16px; margin:10px 0; }
    .product-card p { font-weight:600; color:#00bfff; }
    .product-card button { background:#00bfff; color:#fff; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; font-weight:600; }
    .product-card button:hover { background:#0099cc; }

    footer { background:#111; color:#fff; text-align:center; padding:15px; margin-top:40px; }
  </style>
</head>
<body>
<header>
  <div class="logo"><i class="fa-solid fa-futbol"></i><h2>S&L</h2></div>
  <nav><ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="products.html">Products</a></li>
    <li><a href="addToCart.html">Cart</a></li>
    <li><a href="login.html">Login</a></li>
  </ul></nav>
  <div class="nav-icons"><i class="fa-solid fa-heart"></i><i class="fa-solid fa-cart-shopping"></i></div>
</header>

<section>
  <h1>Our Products</h1>

  <!-- Filters -->
  <div class="filters">
    <select id="modelFilter">
      <option value="">All Models</option>
      <option value="boots">Football Boots</option>
      <option value="jersey">Jerseys</option>
      <option value="ball">Footballs</option>
    </select>
    <select id="storageFilter">
      <option value="">All Sizes</option>
      <option value="S">Small</option>
      <option value="M">Medium</option>
      <option value="L">Large</option>
    </select>
    <select id="priceFilter">
      <option value="">Max Price</option>
      <option value="50000">50,000 MMK</option>
      <option value="100000">100,000 MMK</option>
      <option value="150000">150,000 MMK</option>
    </select>
  </div>

  <!-- Product Grid -->
  <div id="productList" class="product-grid"></div>
</section>

<footer><p>&copy; 2026 S&L Football Store. All rights reserved.</p></footer>

<script>
async function loadProducts() {
  const res = await fetch("http://localhost:8000/api/products");
  const products = await res.json();
  const container = document.getElementById("productList");
  container.innerHTML = "";

  products.forEach(p => {
    container.innerHTML += `
      <div class="product-card">
        <img src="${p.image_url}" alt="${p.name}">
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <button onclick="pressed(${p.id})">Add To Cart</button>
      </div>`;
  });
}

function pressed(id) {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  cart.push(id);
  localStorage.setItem("cart", JSON.stringify(cart));
  window.location.href = "./addToCart.html";
}

loadProducts();
</script>
</body>
</html>
